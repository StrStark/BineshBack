# Production overlay for Binesh.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this overlay does to the base file:
#   - API + migrator pull a pre-built image from a registry (no local build).
#   - Adminer is removed (not exposed in prod).
#   - Postgres port is closed (only reachable inside the docker network).
#   - MinIO port is closed (Traefik fronts it).
#   - Traefik added with Let's Encrypt for automatic TLS.
#   - ASPNETCORE_ENVIRONMENT is Production.
#   - All credentials MUST come from a real .env file at this directory.
#
# Required env vars in .env:
#   IMAGE_TAG=v1.2.3
#   POSTGRES_PASSWORD=<strong-random>
#   JWT_CERT_PASSWORD=<strong-random>
#   OPENAI_API_KEY=sk-...
#   MINIO_ROOT_USER=<strong-random>
#   MINIO_ROOT_PASSWORD=<strong-random>
#   ACME_EMAIL=ops@bineshafzar.ir
#   PUBLIC_HOSTNAME=api.bineshafzar.ir
#   FRONTEND_HOSTNAME=app.bineshafzar.ir   # used for the CORS allow-list
#
# NOTE on MinIO + presigned URLs: MinioFileStorage signs URLs against
# Minio__Endpoint, so that value must be the host the BROWSER will use
# (s3.<PUBLIC_HOSTNAME> via Traefik) with Minio__UseSsl=true — otherwise the
# signed download/upload URLs point at the internal `minio:9000` and the client
# can't reach them. The API reaches the same hostname for its bootstrap/stat
# calls; that's an extra hop through Traefik but keeps signatures valid.

services:

  postgres:
    ports: []                                 # close the port — internal only
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # no default — must be set
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:                                    # remove entirely in prod
    profiles: ["disabled"]

  minio:
    ports: []                                 # closed; reached via Traefik
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    labels:
      traefik.enable: "true"
      traefik.http.routers.minio.rule: Host(`s3.${PUBLIC_HOSTNAME}`)
      traefik.http.routers.minio.entrypoints: websecure
      traefik.http.routers.minio.tls.certresolver: letsencrypt
      traefik.http.services.minio.loadbalancer.server.port: "9000"

  migrator:
    build: !reset null                        # don't build locally
    image: ${REGISTRY:-ghcr.io/bineshafzar}/binesh-api:${IMAGE_TAG:?IMAGE_TAG required}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-binesh};Username=${POSTGRES_USER:-binesh};Password=${POSTGRES_PASSWORD}"
      OpenAI__ApiKey: "sk-migrator-placeholder"
      OpenAI__BaseUrl: "https://api.openai.com/v1"
      OpenAI__Model: "gpt-4o-mini"

  api:
    build: !reset null
    image: ${REGISTRY:-ghcr.io/bineshafzar}/binesh-api:${IMAGE_TAG:?IMAGE_TAG required}
    ports: []                                 # closed; reached via Traefik
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-binesh};Username=${POSTGRES_USER:-binesh};Password=${POSTGRES_PASSWORD}"
      OpenAI__ApiKey:        ${OPENAI_API_KEY:?OPENAI_API_KEY required}
      OpenAI__BaseUrl:       ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OpenAI__Model:         ${OPENAI_MODEL:-gpt-4o}
      OpenAI__FallbackModel: ${OPENAI_FALLBACK_MODEL:-gpt-4o-mini}
      # MinIO — see the header note. Endpoint MUST be the browser-facing host so
      # presigned URLs are reachable; UseSsl=true because Traefik terminates TLS.
      Minio__Endpoint:   s3.${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME required}
      Minio__AccessKey:  ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      Minio__SecretKey:  ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
      Minio__BucketName: ${MINIO_BUCKET:-binesh}
      Minio__UseSsl:     "true"
      Jwt__SigningCertificatePath:     /run/secrets/jwt-signing.pfx
      Jwt__SigningCertificatePassword: ${JWT_CERT_PASSWORD:?JWT_CERT_PASSWORD required}
      Cors__AllowedOrigins__0: https://${FRONTEND_HOSTNAME:?FRONTEND_HOSTNAME required}
    secrets:
      - jwt-signing.pfx
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: Host(`${PUBLIC_HOSTNAME:?PUBLIC_HOSTNAME required}`)
      traefik.http.routers.api.entrypoints: websecure
      traefik.http.routers.api.tls.certresolver: letsencrypt
      traefik.http.services.api.loadbalancer.server.port: "8080"

  traefik:
    image: traefik:v3.2
    container_name: binesh-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=binesh_binesh-net
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL required}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/letsencrypt
    networks: [binesh-net]

volumes:
  postgres-data:
  minio-data:
  traefik-acme:

secrets:
  jwt-signing.pfx:
    file: ./deploy/secrets/jwt-signing.pfx    # generate this with the script in deploy/README.md

networks:
  binesh-net:
    driver: bridge
